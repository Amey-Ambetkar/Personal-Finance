<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link rel="stylesheet" href="/static/style.css">
    <a href="/create-expense">Add Expense</a>
</head>
<body>

<div class="container">

    <h1>Add Expense</h1>

    <form action="/create-expense" method="post">

        <input type="text"
               name="title"
               placeholder="Expense Title"
               required>

        <input type="number"
               step="0.01"
               name="amount"
               placeholder="Amount"
               required>

        <input type="text"
               name="category"
               placeholder="Category"
               required>

        <input type="text"
               name="description"
               placeholder="Description">

        <input type="date"
               name="date"
               required>

        <button type="submit">
            Add Expense
        </button>

    </form>

</div>

</body>
</html>
