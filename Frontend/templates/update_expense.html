<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Update your expense details on FinanceFlow.">
    <title>Update Expense — FinanceFlow</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-animated"></div>

<div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="14" fill="url(#logo-grad)"/><path d="M14 32V20l10-8 10 8v12a2 2 0 01-2 2H16a2 2 0 01-2-2z" stroke="white" stroke-width="2.5" fill="none"/><path d="M20 34v-8h8v8" stroke="white" stroke-width="2.5"/><defs><linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs></svg>
            <span>FinanceFlow</span>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-title">Menu</div>
            <a href="/dashboard" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/expenses" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                <span>Expenses</span>
            </a>
            <div class="sidebar-section-title">Actions</div>
            <a href="/create-expense" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                <span>Add Expense</span>
            </a>
            <a href="/budget" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>
                <span>Set Budget</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="nav-item logout-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <div class="page-header">
            <h1>Update Expense</h1>
            <p>Modify the details of your expense</p>
        </div>

        <div class="form-card">
            <h2>Edit Details</h2>
            <p class="form-subtitle">Update any field and save your changes</p>

            <form action="/update-expense/{{ expense.id }}" method="post" id="update-expense-form">

                <div class="form-group">
                    <input type="text"
                           id="title"
                           name="title"
                           placeholder=" "
                           value="{{ expense.title }}"
                           required>
                    <label for="title">Expense Title</label>
                    <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </div>

                <div class="form-group">
                    <input type="number"
                           id="amount"
                           name="amount"
                           step="0.01"
                           placeholder=" "
                           value="{{ expense.amount }}"
                           required>
                    <label for="amount">Amount (₹)</label>
                    <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                </div>

                <div class="form-group">
                    <select id="category"
                            name="category"
                            required>
                        <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>🍔 Food & Dining</option>
                        <option value="Transport" {% if expense.category == 'Transport' %}selected{% endif %}>🚗 Transport</option>
                        <option value="Shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>🛍️ Shopping</option>
                        <option value="Bills" {% if expense.category == 'Bills' %}selected{% endif %}>📄 Bills & Utilities</option>
                        <option value="Entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>🎬 Entertainment</option>
                        <option value="Health" {% if expense.category == 'Health' %}selected{% endif %}>🏥 Health</option>
                        <option value="Education" {% if expense.category == 'Education' %}selected{% endif %}>📚 Education</option>
                        <option value="Other" {% if expense.category == 'Other' %}selected{% endif %}>📦 Other</option>
                    </select>
                    <label for="category">Category</label>
                    <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>

                <div class="form-group">
                    <input type="text"
                           id="description"
                           name="description"
                           placeholder=" "
                           value="{{ expense.description }}">
                    <label for="description">Description (optional)</label>
                    <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
                </div>

                <div class="form-group">
                    <input type="date"
                           id="date"
                           name="date"
                           placeholder=" "
                           value="{{ expense.date }}"
                           required>
                    <label for="date">Date</label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="update-expense-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                        Save Changes
                    </button>
                    <a href="/expenses" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>

    </main>

</div>

<!-- Mobile Bottom Navigation -->
<nav class="mobile-nav">
    <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Home</span></a>
    <a href="/expenses" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>List</span></a>
    <a href="/create-expense"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>Add</span></a>
    <a href="/budget"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg><span>Budget</span></a>
</nav>

</body>
</html>
