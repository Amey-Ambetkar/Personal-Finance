<!DOCTYPE html>
<html>
<head>
    <title>Update Expense</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Update Expense</h1>

    <form action="/update-expense/{{expense.id}}" method="post">

        <input type="text"
               name="title"
               value="{{expense.title}}"
               required>

        <input type="number"
               step="0.01"
               name="amount"
               value="{{expense.amount}}"
               required>

        <input type="text"
               name="category"
               value="{{expense.category}}"
               required>

        <input type="text"
               name="description"
               value="{{expense.description}}">

        <input type="date"
               name="date"
               value="{{expense.date}}"
               required>

        <button type="submit">
            Update Expense
        </button>

    </form>

</div>

</body>
</html>
